<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Antigravity Kanban — Gerenciador de Tarefas Inteligente</title>
    <meta name="description" content="Organize suas tarefas com mais facilidade usando o Antigravity Kanban. Uma ferramenta ágil com drag and drop nativo, design premium e persistência de dados." />
    <!-- Folha de estilo principal -->
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="logo-container">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-text">Antigravity Kanban</span>
      </div>
      <button class="btn-primary" id="btn-add-task">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Nova Tarefa
      </button>
    </header>

    <!-- Main Kanban Area -->
    <main class="kanban-container">
      <div class="kanban-board" id="kanban-board">
        
        <!-- Coluna: Não Iniciado -->
        <section class="kanban-column" data-status="todo" id="col-todo">
          <div class="column-header">
            <div class="column-title-container">
              <span class="column-dot">●</span>
              <h2 class="column-title">Não Iniciado</h2>
            </div>
            <span class="column-count" id="count-todo">0</span>
          </div>
          <div class="cards-list" id="list-todo">
            <!-- Os cards de tarefas serão inseridos dinamicamente aqui -->
          </div>
        </section>

        <!-- Coluna: Iniciado -->
        <section class="kanban-column" data-status="doing" id="col-doing">
          <div class="column-header">
            <div class="column-title-container">
              <span class="column-dot">●</span>
              <h2 class="column-title">Iniciado</h2>
            </div>
            <span class="column-count" id="count-doing">0</span>
          </div>
          <div class="cards-list" id="list-doing">
            <!-- Os cards de tarefas serão inseridos dinamicamente aqui -->
          </div>
        </section>

        <!-- Coluna: Concluído -->
        <section class="kanban-column" data-status="done" id="col-done">
          <div class="column-header">
            <div class="column-title-container">
              <span class="column-dot">●</span>
              <h2 class="column-title">Concluído</h2>
            </div>
            <span class="column-count" id="count-done">0</span>
          </div>
          <div class="cards-list" id="list-done">
            <!-- Os cards de tarefas serão inseridos dinamicamente aqui -->
          </div>
        </section>

      </div>
    </main>

    <!-- Modal de Adicionar/Editar Tarefa -->
    <div class="modal-overlay" id="task-modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="modal-title">Nova Tarefa</h3>
          <button class="modal-close" id="btn-close-modal" aria-label="Fechar Modal">&times;</button>
        </div>
        <form id="task-form">
          <input type="hidden" id="task-id-input" />
          <div class="modal-body">
            <div class="form-group">
              <label for="task-title" class="form-label">Título da Tarefa</label>
              <input type="text" id="task-title" class="form-input" placeholder="O que você precisa fazer?" required maxLength="80" autocomplete="off" />
            </div>
            <div class="form-group">
              <label for="task-desc" class="form-label">Descrição</label>
              <textarea id="task-desc" class="form-textarea" placeholder="Descreva os detalhes desta tarefa..." maxLength="500"></textarea>
            </div>
            <div class="form-group">
              <label for="task-priority" class="form-label">Prioridade</label>
              <select id="task-priority" class="form-select">
                <option value="low">Baixa</option>
                <option value="medium" selected>Média</option>
                <option value="high">Alta</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn-secondary" id="btn-cancel-task">Cancelar</button>
            <button type="submit" class="btn-primary" id="btn-save-task">Salvar Tarefa</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2026 Antigravity Kanban. Desenvolvido com TypeScript e Vanilla CSS.</p>
    </footer>

    <!-- Script Principal -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
